name: loms-claw

services:
  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    working_dir: /workspace
    command: [
      "deno",
      "run",
      "--allow-env",
      "--allow-ffi",
      "--allow-read",
      "--allow-write",
      "--allow-net",
      "--allow-run",
      "/app/main.ts"
    ]
    volumes:
      - type: bind
        source: ${CLAUDE_HOME:-./claude-home}
        target: /root/.claude
      - type: bind
        source: ${CLAUDE_WORKSPACE:-./claude-workspace}
        target: /workspace
      - type: bind
        source: ${LOMS_CLAW_CONFIG:-../config.json}
        target: /workspace/config.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
