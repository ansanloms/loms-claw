name: loms-claw

services:
  bot:
    build: ..
    env_file:
      - ../.env
    environment:
      - TZ=${TZ:-UTC}
    working_dir: /workspace
    command: ["deno", "run", "-A", "/app/main.ts"]
    volumes:
      - type: bind
        source: ${CLAUDE_HOME:-./claude-home}
        target: /root/.claude
      - type: bind
        source: ${CLAUDE_WORKSPACE:-./claude-workspace}
        target: /workspace
    restart: unless-stopped
