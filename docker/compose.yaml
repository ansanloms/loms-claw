name: loms-claw

services:
  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    working_dir: /workspace
    command: ["deno", "run", "-A", "/app/main.ts"]
    volumes:
      - type: bind
        source: ${CLAUDE_HOME:-./claude-home}
        target: /root/.claude
      - type: bind
        source: ${CLAUDE_WORKSPACE:-./claude-workspace}
        target: /workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
