name: loms-claw

services:
  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    environment:
      # Bot プロセスが読む config.json のパス。
      # CLAUDE_WORKSPACE が /workspace に bind mount されるため、
      # その直下の config.json をコンテナ内の絶対パスで指す。
      - LOMS_CLAW_CONFIG=/workspace/config.json
    working_dir: /workspace
    command: [
      "deno",
      "run",
      "--allow-env",
      "--allow-ffi",
      "--allow-read",
      "--allow-write",
      "--allow-net",
      "--allow-run",
      "/app/main.ts"
    ]
    volumes:
      - type: bind
        source: ${CLAUDE_HOME:-./claude-home}
        target: /root/.claude
      - type: bind
        source: ${CLAUDE_WORKSPACE:-./claude-workspace}
        target: /workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
