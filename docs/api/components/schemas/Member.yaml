type: object
description: ギルドメンバー。
required:
  - id
  - username
  - display_name
  - bot
  - joined_at
  - roles
properties:
  id:
    type: string
    description: ユーザ ID。
  username:
    type: string
    description: ユーザ名。
  display_name:
    type: string
    description: ギルド内の表示名。
  bot:
    type: boolean
    description: Bot ユーザか否か。
  joined_at:
    type:
      - string
      - "null"
    format: date-time
    description: ギルド参加日時。ISO 8601 形式。不明な場合は null。
  roles:
    type: array
    description: 付与済みロール一覧。@everyone を除く。
    items:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: ロール ID。
        name:
          type: string
          description: ロール名。
