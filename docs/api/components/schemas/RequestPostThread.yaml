type: object
description: スレッド作成リクエスト。
additionalProperties: false
required:
  - name
properties:
  name:
    type: string
    minLength: 1
    maxLength: 100
    description: スレッド名。1 文字以上 100 文字以下。
  auto_archive_duration:
    type: integer
    enum:
      - 60
      - 1440
      - 4320
      - 10080
    default: 1440
    description: 自動アーカイブまでの分数。省略時は 1440 (24 時間)。
  reason:
    type: string
    description: 監査ログに残す理由。
