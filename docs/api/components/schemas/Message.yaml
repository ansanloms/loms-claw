type: object
description: メッセージの詳細。
required:
  - id
  - author
  - content
  - created_at
  - edited_at
  - attachments
  - reactions
properties:
  id:
    type: string
    description: メッセージ ID。
  author:
    type: object
    description: 投稿者。
    required:
      - id
      - username
      - display_name
      - bot
    properties:
      id:
        type: string
        description: 投稿者のユーザ ID。
      username:
        type: string
        description: ユーザ名。
      display_name:
        type: string
        description: 表示名。
      bot:
        type: boolean
        description: Bot ユーザか否か。
  content:
    type: string
    description: メッセージ本文。
  created_at:
    type: string
    format: date-time
    description: 投稿日時。ISO 8601 形式。
  edited_at:
    type:
      - string
      - "null"
    format: date-time
    description: 最終編集日時。ISO 8601 形式。未編集の場合は null。
  attachments:
    type: array
    description: 添付ファイル一覧。
    items:
      type: object
      required:
        - name
        - url
        - size
      properties:
        name:
          type:
            - string
            - "null"
          description: ファイル名。
        url:
          type: string
          format: uri
          description: ダウンロード URL。
        size:
          type: integer
          description: ファイルサイズ。単位はバイト。
  reactions:
    type: array
    description: リアクション一覧。
    items:
      type: object
      required:
        - emoji
        - count
      properties:
        emoji:
          type: string
          description: 絵文字の文字列表現。
        count:
          type: integer
          description: リアクション数。
