get:
  operationId: getDiscordChannelMessages
  summary: メッセージ検索。
  tags:
    - discord
  description: チャンネルの直近メッセージを取得し、本文や投稿者で絞り込む。
  parameters:
    - in: path
      name: id
      required: true
      description: チャンネル ID。
      schema:
        type: string
    - in: query
      name: query
      required: false
      description: 本文の部分一致フィルタ。大文字小文字を区別しない。
      schema:
        type: string
    - in: query
      name: author_id
      required: false
      description: 投稿者ユーザ ID でのフィルタ。
      schema:
        type: string
    - in: query
      name: limit
      required: false
      description: 取得件数。1 以上 100 以下。既定は 25。
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
  responses:
    200:
      description: 処理成功時。
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/MessageSummary.yaml
          examples:
            succeeded:
              value:
                $ref: ../examples/ResponseGetMessages.yaml
    400:
      description: チャンネルがメッセージをサポートしない場合。
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ResponseError.yaml
          examples:
            badRequest:
              value:
                $ref: ../examples/ResponseError.yaml
    500:
      description: 処理失敗時。
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ResponseError.yaml
          examples:
            processingFailed:
              value:
                $ref: ../examples/ResponseError.yaml
post:
  operationId: postDiscordChannelMessage
  summary: メッセージ送信。
  tags:
    - discord
  description: チャンネルへメッセージを送信する。
  parameters:
    - in: path
      name: id
      required: true
      description: チャンネル ID。
      schema:
        type: string
  requestBody:
    description: 送信内容。
    content:
      application/json:
        schema:
          $ref: ../components/schemas/RequestPostMessage.yaml
        examples:
          normal:
            value:
              $ref: ../examples/RequestPostMessage.yaml
  responses:
    200:
      description: 処理成功時。
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ResponsePostMessage.yaml
          examples:
            succeeded:
              value:
                $ref: ../examples/ResponsePostMessage.yaml
    400:
      description: content が指定されていない場合。
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ResponseError.yaml
          examples:
            badRequest:
              value:
                $ref: ../examples/ResponseError.yaml
    500:
      description: 処理失敗時。
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ResponseError.yaml
          examples:
            processingFailed:
              value:
                $ref: ../examples/ResponseError.yaml
