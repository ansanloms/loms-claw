get:
  operationId: getDiscordChannel
  summary: チャンネル情報の取得。
  tags:
    - discord
  description: 指定したチャンネルの詳細を取得する。
  parameters:
    - in: path
      name: id
      required: true
      description: チャンネル ID。
      schema:
        type: string
  responses:
    200:
      description: 処理成功時。
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ChannelDetail.yaml
          examples:
            succeeded:
              value:
                $ref: ../examples/ResponseGetChannel.yaml
    403:
      description: 対象ギルドに属さないチャンネルを指定した場合。
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ResponseError.yaml
          examples:
            forbidden:
              value:
                $ref: ../examples/ResponseError.yaml
    404:
      description: チャンネルが存在しない場合。
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ResponseError.yaml
          examples:
            notFound:
              value:
                $ref: ../examples/ResponseError.yaml
    500:
      description: 処理失敗時。
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ResponseError.yaml
          examples:
            processingFailed:
              value:
                $ref: ../examples/ResponseError.yaml
