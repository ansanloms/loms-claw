get:
  operationId: getDiscordChannelMessage
  summary: メッセージ取得。
  tags:
    - discord
  description: 指定したメッセージの詳細を取得する。
  parameters:
    - in: path
      name: id
      required: true
      description: チャンネル ID。
      schema:
        type: string
    - in: path
      name: mid
      required: true
      description: メッセージ ID。
      schema:
        type: string
  responses:
    200:
      description: 処理成功時。
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Message.yaml
          examples:
            succeeded:
              value:
                $ref: ../examples/ResponseGetMessage.yaml
    400:
      description: チャンネルがメッセージをサポートしない場合。
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ResponseError.yaml
          examples:
            badRequest:
              value:
                $ref: ../examples/ResponseError.yaml
    500:
      description: 処理失敗時。
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ResponseError.yaml
          examples:
            processingFailed:
              value:
                $ref: ../examples/ResponseError.yaml
