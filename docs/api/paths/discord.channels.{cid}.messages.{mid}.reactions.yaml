post:
  operationId: postDiscordMessageReaction
  summary: リアクション追加。
  tags:
    - discord
  description: 指定したメッセージへリアクションを追加する。
  parameters:
    - in: path
      name: cid
      required: true
      description: チャンネル ID。
      schema:
        type: string
    - in: path
      name: mid
      required: true
      description: メッセージ ID。
      schema:
        type: string
  requestBody:
    description: 追加する絵文字。
    content:
      application/json:
        schema:
          $ref: ../components/schemas/RequestPostReaction.yaml
        examples:
          normal:
            value:
              $ref: ../examples/RequestPostReaction.yaml
  responses:
    200:
      description: 処理成功時。
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ResponsePostReaction.yaml
          examples:
            succeeded:
              value:
                $ref: ../examples/ResponsePostReaction.yaml
    400:
      description: emoji が指定されていない、またはチャンネルがメッセージをサポートしない場合。
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ResponseError.yaml
          examples:
            badRequest:
              value:
                $ref: ../examples/ResponseError.yaml
    500:
      description: 処理失敗時。
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ResponseError.yaml
          examples:
            processingFailed:
              value:
                $ref: ../examples/ResponseError.yaml
