get:
  operationId: getDiscordMembers
  summary: メンバー一覧・検索。
  tags:
    - discord
  description: ギルドメンバーを一覧または検索する。Server Members Intent が必要。
  parameters:
    - in: query
      name: query
      required: false
      description: 表示名・ユーザ名の前方一致検索。省略時は一覧。
      schema:
        type: string
    - in: query
      name: limit
      required: false
      description: 取得件数。1 以上 100 以下。既定は 25。
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
  responses:
    200:
      description: 処理成功時。
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/Member.yaml
          examples:
            succeeded:
              value:
                $ref: ../examples/ResponseGetMembers.yaml
    500:
      description: 処理失敗時。
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ResponseError.yaml
          examples:
            processingFailed:
              value:
                $ref: ../examples/ResponseError.yaml
