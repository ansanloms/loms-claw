name: loms-claw

services:
  bot:
    build: .
    environment:
      TZ: ${TZ:-Asia/Tokyo}
    working_dir: /data/workspace
    command: [
      "deno",
      "run",
      "--allow-env",
      "--allow-sys",
      "--allow-ffi",
      "--allow-read",
      "--allow-write",
      "--allow-net",
      "--allow-run",
      "/app/main.ts",
    ]
    volumes:
      - type: bind
        source: ./data/home
        target: /data/home
      - type: bind
        source: ./data/workspace
        target: /data/workspace
      - type: bind
        source: ./data/config.json
        target: /data/config.json
        read_only: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
