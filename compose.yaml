name: loms-claw

services:
  bot:
    build: .
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      # アプリが読む設定ファイルのパス (コンテナ内パス)。
      LOMS_CLAW_CONFIG: /workspace/config.json
    working_dir: /workspace
    command: [
      "deno",
      "run",
      "--allow-env",
      "--allow-sys",
      "--allow-ffi",
      "--allow-read",
      "--allow-write",
      "--allow-net",
      "--allow-run",
      "/app/main.ts",
    ]
    volumes:
      - type: bind
        source: ./docker/claude-home
        target: /root/.claude
      - type: bind
        source: ./docker/claude-workspace
        target: /workspace
      - type: bind
        source: ./config.json
        target: /workspace/config.json
        read_only: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
